<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#7C3D12" />
    <meta name="description" content="Professional Fabric Painting Course - 19 expert video classes covering Kalamkari, Tanjore, Pichwal and more." />

    <!-- Prevent caching on sensitive pages -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />

    <!-- Security headers via meta -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <title>Fabric Art Painting Course</title>

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      /* Prevent text selection globally */
      * { -webkit-user-select: none; user-select: none; }
      input, textarea { -webkit-user-select: text; user-select: text; }

      /* Hide until React loads */
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
